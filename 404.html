<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Page Not Found · AB Integrity</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0D1117;--bg2:#161B22;--bdr:#30363D;
    --tx:#E6EDF3;--tx2:#A0AAB6;--tx3:#7D8590;
    --ac:#4F8EF7;--r:#F85149;
    --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:var(--sans)}
  .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
  .code{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--r);margin-bottom:20px}
  h1{font-size:clamp(32px,5vw,56px);font-weight:900;letter-spacing:-1px;margin-bottom:16px}
  p{font-size:15px;color:var(--tx2);line-height:1.7;max-width:440px;margin-bottom:32px}
  a.home{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--ac);text-decoration:none;border:1px solid var(--bdr);padding:12px 24px;transition:border-color .15s}
  a.home:hover{border-color:var(--ac)}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">// error 404 — not found</div>
  <h1>This page doesn't exist.</h1>
  <p>Like an underpowered test result, this URL looked promising but didn't hold up. The tools are all on the home page.</p>
  <a class="home" href="/">← Back to the stack</a>
</div>
</body>
</html>
